name: Duct Pipeline

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main]

jobs:
  duct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # precisa do histórico completo para tags/changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Duct
        run: |
          # Build duct from source (dogfooding!)
          go build -o /tmp/duct ./cmd/duct
          /tmp/duct version

      - name: Validate Ductfile
        run: /tmp/duct validate --file Ductfile.test

      - name: Run Tests
        run: |
          go test -v ./...
          go test -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Run Duct Pipeline (Test)
        run: /tmp/duct run --local --file Ductfile.test

      - name: Upload Coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html