name: Duct

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main]

jobs:
  duct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run Duct
        run: |
          git clone --branch main --depth 1 https://github.com/nmvinicius/duct.git .duct
          sh .duct/bin/duct run